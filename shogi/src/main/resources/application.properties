spring.application.name=shogi
# 🐘 PostgreSQL Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/shogi_db
spring.datasource.username=postgres
spring.datasource.password=12345678

# 🪄 The Hibernate Magic
# 'update' tells Spring Boot to look at your Game.java class and automatically
# create the SQL tables for you if they don't exist yet!
spring.jpa.hibernate.ddl-auto=update

# Show SQL in the console so we can see what the database is doing
spring.jpa.show-sql=true