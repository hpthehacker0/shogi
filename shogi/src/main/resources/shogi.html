<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shogi Engine Visualizer</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #2c3e50; color: white; margin-top: 20px;}
        .info-panel { margin-bottom: 20px; text-align: center; }
        .board { display: grid; grid-template-columns: repeat(9, 50px); grid-template-rows: repeat(9, 50px); gap: 2px; background-color: #34495e; border: 4px solid #1abc9c; padding: 2px;}
        .cell { background-color: #f39c12; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; color: black; cursor: pointer; user-select: none; }
        .cell:hover { background-color: #f1c40f; }
        .selected { background-color: #1abc9c !important; color: white; border: 2px solid white;}
        .black-piece { color: black; }
        .white-piece { color: #d35400; }

        /* 🌟 NEW: Styling for the Hand */
        .hand-container { margin: 15px; padding: 10px; border: 2px dashed #7f8c8d; min-width: 450px; min-height: 40px; display: flex; gap: 5px; align-items: center; justify-content: center; flex-wrap: wrap;}
        .hand-label { font-weight: bold; margin-right: 15px; }
        .hand-piece { background-color: #ecf0f1; color: black; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; user-select: none;}
        .hand-piece:hover { background-color: #bdc3c7; }
        .hand-selected { background-color: #e74c3c !important; color: white; border: 2px solid white; }

        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #1abc9c; color: white; border: none; border-radius: 5px; margin-bottom: 20px;}
        button:hover { background-color: #16a085; }
    </style>
</head>
<body>

<button onclick="startGame()">Start New Game</button>

<div class="info-panel">
    <h2 id="game-status">Game: NOT STARTED</h2>
    <h3 id="turn-indicator">Turn: -</h3>
</div>

<div class="hand-container" id="white-hand">
    <span class="hand-label">White Hand:</span>
</div>

<div class="board" id="board"></div>

<div class="hand-container" id="black-hand">
    <span class="hand-label">Black Hand:</span>
</div>

<script>
    const API_URL = "http://localhost:8080/api/games";
    let currentGameId = null;
    let currentTurn = null;
    let selectedSquare = null;

    // 🌟 NEW: State variable to track if we clicked a piece in our hand
    let selectedHandPiece = null;
    let currentBoardPieces = [];

    function buildEmptyGrid() {
        const boardDiv = document.getElementById("board");
        boardDiv.innerHTML = "";
        for (let row = 0; row < 9; row++) {
            for (let col = 0; col < 9; col++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.id = `cell-${row}-${col}`;
                cell.onclick = () => handleSquareClick(row, col);
                boardDiv.appendChild(cell);
            }
        }
    }

    async function startGame() {
        try {
            const response = await fetch(`${API_URL}/start`, { method: 'POST' });
            const game = await response.json();
            currentGameId = game.id;
            updateUI(game);
        } catch (error) {
            alert("Failed to connect to Spring Boot! Is the server running?");
        }
    }

    // 🌟 NEW: Function to handle clicking a piece in the hand
    function handleHandClick(player, pieceName, htmlElementId) {
        if (player !== currentTurn) return; // Can't touch enemy hand!

        // Clear board selection if we click a hand piece
        clearSelections();

        selectedHandPiece = pieceName;
        document.getElementById(htmlElementId).classList.add("hand-selected");
    }

    function clearSelections() {
        if (selectedSquare) {
            document.getElementById(`cell-${selectedSquare.row}-${selectedSquare.col}`).classList.remove("selected");
            selectedSquare = null;
        }
        // Clear hand selections
        document.querySelectorAll('.hand-piece').forEach(el => el.classList.remove('hand-selected'));
        selectedHandPiece = null;
    }

    async function handleSquareClick(row, col) {
        if (!currentGameId) return;

        // --- 🌟 NEW: IS IT A DROP? ---
        if (selectedHandPiece != null) {
            // We have a piece in our hand, and we clicked the board to drop it!
            const moveRequest = {
                requestingPlayer: currentTurn,
                startRow: -1,
                startCol: -1,
                endRow: row,
                endCol: col,
                promote: false,
                isDrop: true,
                dropPieceName: selectedHandPiece
            };

            await sendMoveRequest(moveRequest);
            clearSelections();
            return;
        }

        // --- EXISTING NORMAL MOVE LOGIC ---
        if (!selectedSquare) {
            selectedSquare = { row, col };
            document.getElementById(`cell-${selectedSquare.row}-${selectedSquare.col}`).classList.add("selected");
            return;
        }

        if (selectedSquare.row === row && selectedSquare.col === col) {
            clearSelections();
            return;
        }

        const movingPiece = currentBoardPieces.find(p => p.row === selectedSquare.row && p.col === selectedSquare.col);
        let wantsToPromote = false;

        if (movingPiece && !movingPiece.isPromoted) {
            const isEnteringBlackZone = (currentTurn === "BLACK" && row <= 2);
            const isEnteringWhiteZone = (currentTurn === "WHITE" && row >= 6);

            let isMandatory = false;
            if (currentTurn === "BLACK" && row === 0 && movingPiece.name === "Pawn") isMandatory = true;
            if (currentTurn === "WHITE" && row === 8 && movingPiece.name === "Pawn") isMandatory = true;

            if (isMandatory) wantsToPromote = true;
            else if (isEnteringBlackZone || isEnteringWhiteZone) {
                if (movingPiece.name !== "Gold General" && movingPiece.name !== "King") {
                    wantsToPromote = window.confirm("Do you want to promote this piece?");
                }
            }
        }

        const moveRequest = {
            requestingPlayer: currentTurn,
            startRow: selectedSquare.row,
            startCol: selectedSquare.col,
            endRow: row,
            endCol: col,
            promote: wantsToPromote,
            isDrop: false,
            dropPieceName: ""
        };

        await sendMoveRequest(moveRequest);
        clearSelections();
    }

    async function sendMoveRequest(moveRequest) {
        try {
            const response = await fetch(`${API_URL}/${currentGameId}/move`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(moveRequest)
            });

            if (response.ok) {
                const updatedGame = await response.json();
                updateUI(updatedGame);
            } else {
                const errorMessage = await response.text();
                alert("ILLEGAL MOVE: " + errorMessage);
            }
        } catch (error) {
            console.error(error);
        }
    }

    function updateUI(game) {
        currentTurn = game.currentTurn;
        document.getElementById("game-status").innerText = `Game ID: ${game.id} | Status: ${game.status}`;
        document.getElementById("turn-indicator").innerText = `Turn: ${game.currentTurn}`;

        buildEmptyGrid();

        // 🌟 NEW: Rebuild the Hands
        const blackHandContainer = document.getElementById("black-hand");
        const whiteHandContainer = document.getElementById("white-hand");

        blackHandContainer.innerHTML = '<span class="hand-label">Black Hand:</span>';
        whiteHandContainer.innerHTML = '<span class="hand-label">White Hand:</span>';

        currentBoardPieces = JSON.parse(game.boardStateJson);

        let handIndex = 0; // Unique ID for each HTML element

        currentBoardPieces.forEach(piece => {
            let displayName = piece.name.substring(0, 2).toUpperCase();
            if (piece.isPromoted) displayName = "+" + displayName;

            if (piece.location === "BOARD") {
                const cell = document.getElementById(`cell-${piece.row}-${piece.col}`);
                cell.innerText = displayName;
                cell.classList.add(piece.player === "BLACK" ? "black-piece" : "white-piece");
            }
            else if (piece.location === "BLACK_HAND") {
                const handHtml = `<div class="hand-piece" id="hand-${handIndex}" onclick="handleHandClick('BLACK', '${piece.name}', 'hand-${handIndex}')">${piece.name}</div>`;
                blackHandContainer.innerHTML += handHtml;
                handIndex++;
            }
            else if (piece.location === "WHITE_HAND") {
                const handHtml = `<div class="hand-piece" id="hand-${handIndex}" onclick="handleHandClick('WHITE', '${piece.name}', 'hand-${handIndex}')">${piece.name}</div>`;
                whiteHandContainer.innerHTML += handHtml;
                handIndex++;
            }
        });
    }

    buildEmptyGrid();
</script>
</body>
</html>
